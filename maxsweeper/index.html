<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maxsweeper 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0e0d0c;
    --surface:      #1a1917;
    --surface-2:    #222019;
    --surface-3:    #2c2a22;
    --cell-hidden:  #252218;
    --cell-hover:   #332f22;
    --cell-rev:     #141310;
    --gold:         #C8922A;   /* warm honey-gold — Max's actual eye color */
    --gold-bright:  #DBA84A;
    --gold-glow:    rgba(200,146,42,0.18);
    --gold-dim:     #7a5818;
    --red:          #c84b3c;
    --text:         #f0ece4;
    --text-2:       #9a9488;
    --text-muted:   #5a5650;
    --border:       rgba(255,255,255,0.05);
    --font-display: 'Syne', system-ui, sans-serif;
    --font-mono:    'Space Mono', monospace;
    --font:         system-ui, -apple-system, sans-serif;
  }

  html { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px 36px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Logo ─────────────────────────────────────── */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 12px var(--gold-glow));
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    cursor: default;
  }
  .logo-icon:hover { transform: rotate(-8deg) scale(1.1); }

  .logo-text-wrap { display: flex; flex-direction: column; gap: 2px; }

  .logo-title {
    font-family: var(--font-display);
    font-size: clamp(22px, 6vw, 34px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .logo-title em { color: var(--gold); font-style: normal; }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* ── Difficulty ───────────────────────────────── */
  .diff-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .diff-btn {
    padding: 7px 15px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-2);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.14s;
    font-family: var(--font-display);
  }
  .diff-btn:hover { border-color: var(--gold); color: var(--gold); }
  .diff-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0e0d0c;
  }

  /* ── HUD ──────────────────────────────────────── */
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border-radius: 14px;
    padding: 11px 18px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    gap: 8px;
  }

  .hud-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    min-width: 48px;
  }
  .hud-val {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .hud-val.gold { color: var(--gold); }
  .hud-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .reset-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; justify-content: center;
  }
  .reset-btn:hover { background: var(--gold-glow); border-color: var(--gold); transform: scale(1.12) rotate(12deg); }
  .reset-btn:active { transform: scale(0.92); }

  /* ── Flag toggle (touch) ──────────────────────── */
  .flag-row {
    display: none;
    margin-bottom: 10px;
    justify-content: center;
  }
  @media (hover: none) { .flag-row { display: flex; } }

  .flag-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 7px 18px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.14s;
    font-family: var(--font-display);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .flag-btn.on { background: var(--gold-glow); border-color: var(--gold); color: var(--gold); }

  /* ── Board ────────────────────────────────────── */
  .board-outer {
    width: 100%;
    max-width: 100vw;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    justify-content: center;
  }

  .board-wrap {
    display: inline-block;
    background: var(--surface);
    border-radius: 14px;
    padding: 12px;
    box-shadow:
      0 0 0 1px var(--border),
      0 8px 32px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  #board {
    display: grid;
    gap: 2px;
    user-select: none;
    touch-action: none;
  }

  .cell {
    /* --cs set by JS per difficulty+viewport */
    width: var(--cs, 34px);
    height: var(--cs, 34px);
    border-radius: 5px;
    background: var(--cell-hidden);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: calc(var(--cs, 34px) * 0.42);
    cursor: pointer;
    transition: background 0.09s, transform 0.07s;
    border: 1px solid rgba(255,255,255,0.03);
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, transparent 55%);
    border-radius: 4px;
    pointer-events: none;
  }

  .cell:active:not(.revealed) { transform: scale(0.9); }

  @media (hover: hover) {
    .cell:hover:not(.revealed) {
      background: var(--cell-hover);
      transform: scale(1.06);
      z-index: 2;
    }
  }

  .cell.revealed {
    background: var(--cell-rev);
    cursor: default;
    border-color: rgba(255,255,255,0.02);
  }
  .cell.revealed::after { display: none; }

  .cell.mine-hit { background: #5c1a14 !important; border-color: var(--red) !important; animation: explode .35s ease; }
  .cell.mine-all { background: #1e1310 !important; }

  .n1 { color: #6cb4f5; }
  .n2 { color: #52d68a; }
  .n3 { color: #f07070; }
  .n4 { color: #8b90f0; }
  .n5 { color: #f0914a; }
  .n6 { color: #38d4c8; }
  .n7 { color: #e8a0f0; }
  .n8 { color: #7a7870; }

  /* ── Progress ─────────────────────────────────── */
  .progress-wrap {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 18px;
    margin-top: 12px;
    border: 1px solid var(--border);
  }

  .prog-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .prog-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .prog-frac {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
  }
  .prog-frac b { color: var(--gold); }

  .prog-bar {
    height: 4px;
    background: var(--surface-3);
    border-radius: 9999px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
    border-radius: 9999px;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .prog-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .prog-stat {
    background: var(--surface-2);
    border-radius: 9px;
    padding: 9px 10px;
    display: flex;
    align-items: center;
    gap: 7px;
    border: 1px solid var(--border);
  }
  .prog-stat-icon { font-size: 16px; flex-shrink: 0; }
  .prog-stat-val {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .prog-stat-val.gold { color: var(--gold); }
  .prog-stat-lbl {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── Overlay ──────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,9,8,0.88);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s;
  }
  .overlay.on { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 32px 36px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    max-width: 300px; width: 88%;
    transform: scale(0.88) translateY(12px);
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  .overlay.on .modal { transform: scale(1) translateY(0); }

  .modal-icon { font-size: 52px; display: block; margin-bottom: 12px; line-height: 1; }
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: 8px;
  }
  .modal-title.win { color: var(--gold); }
  .modal-sub { color: var(--text-2); font-size: 13px; margin-bottom: 18px; line-height: 1.6; }

  .modal-nums {
    display: flex; justify-content: center; gap: 24px;
    padding: 14px 0; margin-bottom: 18px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .modal-num { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .modal-num-val { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--gold); }
  .modal-num-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

  .play-btn {
    background: var(--gold);
    color: #0e0d0c;
    border: none;
    padding: 13px 24px;
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: var(--font-display);
    transition: all 0.14s;
    width: 100%;
  }
  .play-btn:hover { background: var(--gold-bright); transform: translateY(-1px); }
  .play-btn:active { transform: translateY(0); }

  /* ── Confetti ─────────────────────────────────── */
  .paw {
    position: fixed; pointer-events: none; z-index: 200;
    animation: pawFall linear forwards;
  }
  @keyframes pawFall {
    0%   { transform: translateY(-30px) rotate(0deg) scale(1); opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  @keyframes explode {
    0%, 100% { transform: scale(1); }
    40%       { transform: scale(1.35); }
    70%       { transform: scale(0.88); }
  }

  /* ── Footer ───────────────────────────────────── */
  footer {
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.06em;
  }
  footer b { color: var(--gold); font-weight: 400; }
</style>
</head>
<body>

<!-- Logo row -->
<div class="logo-row">
  <!-- Max SVG: border collie — simple iconic dog face, not a lemur -->
  <svg class="logo-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <!-- Left ear (floppy, hangs low) -->
    <ellipse cx="18" cy="38" rx="11" ry="18" fill="#1a1512" rx="11"/>
    <ellipse cx="18" cy="39" rx="7.5" ry="13" fill="#251e18"/>
    <!-- Right ear -->
    <ellipse cx="62" cy="38" rx="11" ry="18" fill="#1a1512"/>
    <ellipse cx="62" cy="39" rx="7.5" ry="13" fill="#251e18"/>
    <!-- Head -->
    <circle cx="40" cy="38" r="26" fill="#1e1a14"/>
    <!-- Forehead fur shading -->
    <ellipse cx="40" cy="26" rx="14" ry="9" fill="#2a2418" opacity="0.7"/>
    <!-- White blaze (border collie trait — narrow stripe down face) -->
    <ellipse cx="40" cy="50" rx="9" ry="12" fill="#2e2820"/>
    <!-- Left eye socket -->
    <ellipse cx="30" cy="37" rx="6" ry="5.5" fill="#141210"/>
    <!-- Left eye iris — warm amber, not neon orange -->
    <ellipse cx="30" cy="37" rx="4.2" ry="4" fill="#7C5A1E"/>
    <ellipse cx="30" cy="37" rx="2.8" ry="2.6" fill="#111009"/>
    <circle cx="31.4" cy="35.6" r="1.2" fill="rgba(255,255,255,0.7)"/>
    <!-- Right eye socket -->
    <ellipse cx="50" cy="37" rx="6" ry="5.5" fill="#141210"/>
    <!-- Right eye iris -->
    <ellipse cx="50" cy="37" rx="4.2" ry="4" fill="#7C5A1E"/>
    <ellipse cx="50" cy="37" rx="2.8" ry="2.6" fill="#111009"/>
    <circle cx="51.4" cy="35.6" r="1.2" fill="rgba(255,255,255,0.7)"/>
    <!-- Muzzle / snout -->
    <ellipse cx="40" cy="52" rx="11" ry="8" fill="#171411"/>
    <!-- Nose -->
    <ellipse cx="40" cy="48" rx="5.5" ry="3.8" fill="#0d0b09"/>
    <ellipse cx="39" cy="46.8" rx="2" ry="1" fill="rgba(255,255,255,0.15)"/>
    <!-- Mouth line -->
    <path d="M 35.5 53.5 Q 40 57.5 44.5 53.5" stroke="#0d0b09" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Chin -->
    <ellipse cx="40" cy="60" rx="5" ry="3" fill="#1a1714" opacity="0.5"/>
  </svg>

  <div class="logo-text-wrap">
    <div class="logo-title">Max<em>sweeper</em></div>
    <div class="logo-sub">hold to flag · right-click to flag</div>
  </div>
</div>

<!-- Difficulty -->
<div class="diff-row">
  <button class="diff-btn active" data-diff="puppy">🐶 Puppy</button>
  <button class="diff-btn" data-diff="doggo">🐕 Doggo</button>
  <button class="diff-btn" data-diff="max">💀 Max Mode</button>
</div>

<!-- HUD -->
<div class="hud">
  <div class="hud-stat">
    <div class="hud-val gold" id="mine-count">10</div>
    <div class="hud-label">Mines</div>
  </div>
  <button class="reset-btn" id="reset-btn">🐾</button>
  <div class="hud-stat">
    <div class="hud-val" id="timer">0</div>
    <div class="hud-label">Seconds</div>
  </div>
</div>

<!-- Flag toggle (touch only) -->
<div class="flag-row">
  <button class="flag-btn" id="flag-btn">
    <span id="flag-icon">👆</span>
    <span id="flag-lbl">REVEAL MODE</span>
  </button>
</div>

<!-- Board -->
<div class="board-outer">
  <div class="board-wrap">
    <div id="board"></div>
  </div>
</div>

<!-- Mine progress -->
<div class="progress-wrap">
  <div class="prog-top">
    <span class="prog-label">Mines found</span>
    <span class="prog-frac"><b id="p-flagged">0</b> / <span id="p-total">10</span></span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-stats">
    <div class="prog-stat">
      <span class="prog-stat-icon">🐾</span>
      <div>
        <div class="prog-stat-val gold" id="ps-flagged">0</div>
        <div class="prog-stat-lbl">Flagged</div>
      </div>
    </div>
    <div class="prog-stat">
      <span class="prog-stat-icon">🐶</span>
      <div>
        <div class="prog-stat-val" id="ps-left">10</div>
        <div class="prog-stat-lbl">Remaining</div>
      </div>
    </div>
    <div class="prog-stat">
      <span class="prog-stat-icon">🟫</span>
      <div>
        <div class="prog-stat-val" id="ps-revealed">0</div>
        <div class="prog-stat-lbl">Revealed</div>
      </div>
    </div>
  </div>
</div>

<footer>made for <b>Max</b> · a very good boy 🐾</footer>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="modal">
    <span class="modal-icon" id="m-icon">🐶</span>
    <div class="modal-title" id="m-title">Woof!</div>
    <div class="modal-sub" id="m-sub">Max was right there.</div>
    <div class="modal-nums">
      <div class="modal-num">
        <div class="modal-num-val" id="m-time">0</div>
        <div class="modal-num-lbl">Seconds</div>
      </div>
      <div class="modal-num">
        <div class="modal-num-val" id="m-rev">0</div>
        <div class="modal-num-lbl">Revealed</div>
      </div>
    </div>
    <button class="play-btn" id="play-again">Play Again 🐾</button>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────
  const DIFFS = {
    puppy: { rows: 9,  cols: 9,  mines: 10 },
    doggo: { rows: 16, cols: 16, mines: 40 },
    max:   { rows: 16, cols: 30, mines: 99 },
  };
  const NCOLOR = ['','n1','n2','n3','n4','n5','n6','n7','n8'];

  // ── State ──────────────────────────────────────
  let board, rows, cols, totalMines;
  let minesLeft, flagged, revealed;
  let dead, won, virgin;
  let secs, ticker;
  let diff = 'puppy';
  let flagMode = false;
  let longPress = null;
  const LP = 420; // long-press ms

  // ── DOM ────────────────────────────────────────
  const $  = id => document.getElementById(id);
  const boardEl   = $('board');
  const overlay   = $('overlay');
  const flagBtn   = $('flag-btn');
  const flagIcon  = $('flag-icon');
  const flagLbl   = $('flag-lbl');

  // ── Cell size — fits viewport ──────────────────
  function calcCellSize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Horizontal: viewport - page padding - board padding - gaps
    const hPad = 14 * 2 + 12 * 2; // page + board
    const hGaps = (cols - 1) * 2;
    const fromW = Math.floor((vw - hPad - hGaps) / cols);

    // Vertical: estimate chrome height above board
    // logo ~72px, diff ~40px, hud ~60px, flag ~38px, gaps ~50px
    const chromeAbove = 72 + 40 + 60 + 38 + 50;
    // progress + footer ~130px, bottom padding 36px
    const chromeBelow = 166;
    const vAvail = vh - chromeAbove - chromeBelow;
    const vGaps  = (rows - 1) * 2;
    const fromH  = Math.floor((vAvail - vGaps) / rows);

    // Clamp: min 18px (readable), max 36px (not huge)
    return Math.max(18, Math.min(36, fromW, fromH));
  }

  function applyCellSize() {
    const cs = calcCellSize();
    document.documentElement.style.setProperty('--cs', cs + 'px');
  }

  // ── New game ───────────────────────────────────
  function newGame(d) {
    diff = d;
    const cfg = DIFFS[d];
    rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines;
    minesLeft = totalMines; flagged = 0; revealed = 0;
    dead = false; won = false; virgin = true;
    flagMode = false; updateFlagBtn();

    stopTimer(); secs = 0;
    $('timer').textContent = '0';
    $('mine-count').textContent = minesLeft;
    $('reset-btn').textContent = '🐾';

    board = Array.from({length: rows}, () =>
      Array.from({length: cols}, () =>
        ({mine:false, rev:false, flag:false, n:0})));

    applyCellSize();
    updateProgress();
    render();
    overlay.classList.remove('on');
  }

  // ── Place mines (after first click) ───────────
  function placeMines(sr, sc) {
    const safe = new Set();
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const r = sr+dr, c = sc+dc;
        if (inBounds(r,c)) safe.add(r*cols+c);
      }
    let p = 0;
    while (p < totalMines) {
      const i = Math.floor(Math.random()*rows*cols);
      const r = Math.floor(i/cols), c = i%cols;
      if (!safe.has(i) && !board[r][c].mine) { board[r][c].mine = true; p++; }
    }
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (board[r][c].mine) continue;
        let n = 0;
        eachNeighbor(r,c, (nr,nc) => { if(board[nr][nc].mine) n++; });
        board[r][c].n = n;
      }
  }

  function inBounds(r,c) { return r>=0 && r<rows && c>=0 && c<cols; }

  function eachNeighbor(r,c,fn) {
    for (let dr=-1; dr<=1; dr++)
      for (let dc=-1; dc<=1; dc++) {
        if (!dr && !dc) continue;
        const nr=r+dr, nc=c+dc;
        if (inBounds(nr,nc)) fn(nr,nc);
      }
  }

  // ── Reveal ────────────────────────────────────
  function doReveal(r,c) {
    if (dead||won) return;
    const cell = board[r][c];
    if (cell.rev||cell.flag) return;
    if (virgin) { virgin=false; placeMines(r,c); startTimer(); }
    cell.rev = true; revealed++;
    if (cell.mine) { boom(r,c); return; }
    if (cell.n===0) flood(r,c);
    render(); updateProgress(); checkWin();
  }

  function flood(r,c) {
    const q = [];
    eachNeighbor(r,c,(nr,nc)=>{
      const n=board[nr][nc];
      if(!n.rev&&!n.flag&&!n.mine){n.rev=true;revealed++;if(!n.n)q.push([nr,nc]);}
    });
    q.forEach(([qr,qc])=>flood(qr,qc));
  }

  // ── Flag ──────────────────────────────────────
  function doFlag(r,c) {
    if (dead||won) return;
    const cell = board[r][c];
    if (cell.rev) return;
    if (!cell.flag && minesLeft===0) return;
    cell.flag = !cell.flag;
    flagged  += cell.flag?1:-1;
    minesLeft+= cell.flag?-1:1;
    $('mine-count').textContent = minesLeft;
    render(); updateProgress(); checkWin();
  }

  // ── Boom ──────────────────────────────────────
  function boom(hr,hc) {
    dead = true; stopTimer(); $('reset-btn').textContent='💀';
    for (let r=0;r<rows;r++)
      for (let c=0;c<cols;c++)
        if(board[r][c].mine&&!board[r][c].flag) board[r][c].rev=true;
    render();
    boardEl.querySelectorAll('.cell')[hr*cols+hc].classList.add('mine-hit');
    setTimeout(()=>showModal(false),450);
  }

  // ── Win ───────────────────────────────────────
  function checkWin() {
    if (revealed >= rows*cols - totalMines) {
      won=true; stopTimer(); $('reset-btn').textContent='😎';
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
        if(board[r][c].mine&&!board[r][c].flag){board[r][c].flag=true;flagged++;}
      updateProgress();
      setTimeout(()=>showModal(true),250);
    }
  }

  // ── Timer ─────────────────────────────────────
  function startTimer(){ticker=setInterval(()=>{secs++;$('timer').textContent=secs;},1000);}
  function stopTimer(){clearInterval(ticker);ticker=null;}

  // ── Progress ──────────────────────────────────
  function updateProgress() {
    const pct = totalMines>0 ? (flagged/totalMines)*100 : 0;
    $('prog-fill').style.width = Math.min(pct,100)+'%';
    $('p-flagged').textContent  = flagged;
    $('p-total').textContent    = totalMines;
    $('ps-flagged').textContent = flagged;
    $('ps-left').textContent    = Math.max(0,totalMines-flagged);
    $('ps-revealed').textContent= revealed;
  }

  // ── Render ────────────────────────────────────
  function render() {
    boardEl.style.gridTemplateColumns = `repeat(${cols},var(--cs,34px))`;
    boardEl.innerHTML='';
    for (let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
      const cell = board[r][c];
      const el = document.createElement('div');
      el.className='cell';

      if(cell.rev){
        el.classList.add('revealed');
        if(cell.mine){ el.classList.add('mine-all'); el.textContent='🐶'; }
        else if(cell.n){ el.textContent=cell.n; el.classList.add(NCOLOR[cell.n]); }
      } else if(cell.flag){
        el.textContent='🐾';
      }

      // Mouse
      el.addEventListener('click',()=>{ flagMode?doFlag(r,c):doReveal(r,c); });
      el.addEventListener('contextmenu',e=>{ e.preventDefault(); doFlag(r,c); });

      // Touch — long press to flag, tap to reveal/flag per mode
      el.addEventListener('touchstart',e=>{
        e.preventDefault();
        longPress=setTimeout(()=>{ longPress=null; doFlag(r,c); },LP);
      },{passive:false});
      el.addEventListener('touchend',e=>{
        e.preventDefault();
        if(longPress!==null){ clearTimeout(longPress); longPress=null; flagMode?doFlag(r,c):doReveal(r,c); }
      },{passive:false});
      el.addEventListener('touchmove',e=>{
        e.preventDefault(); clearTimeout(longPress); longPress=null;
      },{passive:false});

      boardEl.appendChild(el);
    }
  }

  // ── Flag toggle ───────────────────────────────
  function updateFlagBtn(){
    if(flagMode){ flagBtn.classList.add('on'); flagIcon.textContent='🐾'; flagLbl.textContent='FLAG MODE'; }
    else        { flagBtn.classList.remove('on'); flagIcon.textContent='👆'; flagLbl.textContent='REVEAL MODE'; }
  }

  // ── Modal ─────────────────────────────────────
  function showModal(isWin) {
    $('m-icon').textContent   = isWin ? '🥳' : '🐶';
    $('m-title').textContent  = isWin ? 'Good boy, you win!' : 'Woof! Found Max.';
    $('m-title').className    = 'modal-title ' + (isWin?'win':'');
    $('m-sub').textContent    = isWin
      ? 'Max is proud. Every mine sniffed out.'
      : "Max was hiding right there. He's sneaky like that.";
    $('m-time').textContent   = secs;
    $('m-rev').textContent    = revealed;
    overlay.classList.add('on');
    if(isWin) spawnPaws();
  }

  // ── Confetti ──────────────────────────────────
  function spawnPaws(){
    const e=['🐾','🦴','🐶','⭐','🎉'];
    for(let i=0;i<45;i++) setTimeout(()=>{
      const d=document.createElement('div');
      d.className='paw'; d.textContent=e[~~(Math.random()*e.length)];
      d.style.left=(Math.random()*110-5)+'vw'; d.style.top='-30px';
      const dur=1.8+Math.random()*2; d.style.animationDuration=dur+'s';
      d.style.fontSize=(12+Math.random()*16)+'px';
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),dur*1100);
    },i*60);
  }

  // ── Events ────────────────────────────────────
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      newGame(btn.dataset.diff);
    });
  });

  $('reset-btn').addEventListener('click',()=>newGame(diff));
  $('play-again').addEventListener('click',()=>newGame(diff));
  flagBtn.addEventListener('click',()=>{ flagMode=!flagMode; updateFlagBtn(); });
  boardEl.addEventListener('contextmenu',e=>e.preventDefault());

  // Recalc cell size on resize
  window.addEventListener('resize',()=>{ applyCellSize(); render(); });

  // ── Boot ──────────────────────────────────────
  newGame('puppy');
</script>
</body>
</html>
