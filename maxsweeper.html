<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxsweeper 🐾</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #FAFAF8;
    --surface:      #FFFFFF;
    --board-bg:     #1C1917;
    --cell-hidden:  #292524;
    --cell-hover:   #3C3532;
    --cell-rev:     #F5F0EB;
    --cell-rev-alt: #EDE8E3;
    --amber:        #D97706;
    --amber-light:  #FDE68A;
    --amber-dim:    #92400E;
    --red:          #DC2626;
    --text:         #1C1917;
    --muted:        #78716C;
    --border:       rgba(28,25,23,0.1);
    --cell-size:    36px;
    --font:         system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────────────── */
  header { text-align: center; margin-bottom: 32px; }

  h1 {
    font-family: Georgia, serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }
  h1 span { color: var(--amber); }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ── Controls ───────────────────────────── */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(28,25,23,0.06), 0 4px 16px rgba(28,25,23,0.04);
    width: 100%;
    max-width: 600px;
  }

  .difficulty-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .diff-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .diff-btn:hover { border-color: var(--amber); color: var(--amber-dim); }
  .diff-btn.active {
    background: var(--amber);
    border-color: var(--amber);
    color: #fff;
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    min-width: 52px;
  }
  .stat-icon { font-size: 16px; }

  .reset-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 22px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .reset-btn:hover {
    background: var(--amber-light);
    border-color: var(--amber);
    transform: scale(1.08);
  }
  .reset-btn:active { transform: scale(0.95); }

  /* ── Board wrapper ──────────────────────── */
  .board-wrap {
    background: var(--board-bg);
    border-radius: 16px;
    padding: 16px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 8px 32px rgba(0,0,0,0.35),
      0 2px 8px rgba(0,0,0,0.2);
    overflow-x: auto;
    max-width: 100%;
  }

  /* ── Grid ───────────────────────────────── */
  #board {
    display: grid;
    gap: 2px;
    user-select: none;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border-radius: 5px;
    background: var(--cell-hidden);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.1s, transform 0.08s;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    border-radius: 4px;
    pointer-events: none;
  }

  .cell:hover:not(.revealed):not(.dead) {
    background: var(--cell-hover);
    transform: scale(1.06);
    z-index: 1;
  }

  .cell.revealed {
    background: var(--cell-rev);
    cursor: default;
    color: inherit;
    border-color: rgba(28,25,23,0.08);
  }
  .cell.revealed::before { display: none; }

  .cell.flagged { font-size: 18px; cursor: pointer; }

  .cell.mine-hit {
    background: var(--red) !important;
    animation: shake 0.3s ease;
  }

  .cell.mine-revealed { background: #2D2420 !important; }

  /* Number colors */
  .n1 { color: #3B82F6; }
  .n2 { color: #22C55E; }
  .n3 { color: #EF4444; }
  .n4 { color: #1E3A5F; }
  .n5 { color: #B91C1C; }
  .n6 { color: #0891B2; }
  .n7 { color: #1C1917; }
  .n8 { color: #78716C; }

  /* ── Overlay (win / lose) ───────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,25,23,0.75);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    max-width: 340px;
    width: 90%;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .overlay.visible .modal { transform: scale(1); }

  .modal-icon { font-size: 64px; margin-bottom: 16px; display: block; }
  .modal-title {
    font-family: Georgia, serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .modal-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; line-height: 1.5; }

  .modal-time {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    font-weight: 600;
  }
  .modal-time span { color: var(--amber); font-weight: 700; }

  .play-again {
    background: var(--amber);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
    width: 100%;
  }
  .play-again:hover { background: #B45309; transform: translateY(-1px); }
  .play-again:active { transform: translateY(0); }

  /* ── Confetti 🐾 ────────────────────────── */
  .confetti-piece {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-3px); }
    40%       { transform: translateX(3px); }
    60%       { transform: translateX(-3px); }
    80%       { transform: translateX(3px); }
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    margin-top: 32px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }
  footer span { color: var(--amber); }

  /* ── Responsive cell size ───────────────── */
  @media (max-width: 480px) {
    :root { --cell-size: 28px; }
    .controls { gap: 12px; padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Max<span>sweeper</span></h1>
  <p class="subtitle">feat. Max 🐾 &nbsp;·&nbsp; right-click to flag</p>
</header>

<div class="controls">
  <div class="difficulty-group">
    <button class="diff-btn active" data-diff="puppy">🐶 Puppy</button>
    <button class="diff-btn" data-diff="doggo">🐕 Doggo</button>
    <button class="diff-btn" data-diff="max">💀 Max Mode</button>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-icon">🐾</span><span id="mine-count">10</span></div>
    <button class="reset-btn" id="reset-btn" title="New game">🐾</button>
    <div class="stat"><span class="stat-icon">⏱</span><span id="timer">0</span></div>
  </div>
</div>

<div class="board-wrap">
  <div id="board"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <span class="modal-icon" id="modal-icon">🐶</span>
    <div class="modal-title" id="modal-title">You found Max!</div>
    <div class="modal-sub" id="modal-sub">Max was hiding all along.</div>
    <div class="modal-time" id="modal-time">Time: <span id="modal-time-val">0</span>s</div>
    <button class="play-again" id="play-again">Play Again 🐾</button>
  </div>
</div>

<footer>Made for <span>Max</span> 🐾 &nbsp;·&nbsp; a very good boy</footer>

<script>
  // ─── Config ──────────────────────────────────────
  const DIFFICULTIES = {
    puppy: { rows: 9,  cols: 9,  mines: 10 },
    doggo: { rows: 16, cols: 16, mines: 40 },
    max:   { rows: 16, cols: 30, mines: 99 },
  };

  const NUM_COLORS = ['','n1','n2','n3','n4','n5','n6','n7','n8'];

  // ─── State ───────────────────────────────────────
  let board       = [];   // 2D array of cell objects
  let rows, cols, totalMines;
  let minesLeft   = 0;
  let gameOver    = false;
  let gameWon     = false;
  let firstClick  = true;
  let timerVal    = 0;
  let timerHandle = null;
  let currentDiff = 'puppy';

  // cell: { mine, revealed, flagged, count }

  // ─── DOM refs ────────────────────────────────────
  const boardEl     = document.getElementById('board');
  const mineCountEl = document.getElementById('mine-count');
  const timerEl     = document.getElementById('timer');
  const resetBtn    = document.getElementById('reset-btn');
  const overlay     = document.getElementById('overlay');
  const modalIcon   = document.getElementById('modal-icon');
  const modalTitle  = document.getElementById('modal-title');
  const modalSub    = document.getElementById('modal-sub');
  const modalTimeEl = document.getElementById('modal-time-val');
  const playAgain   = document.getElementById('play-again');

  // ─── Init ────────────────────────────────────────
  function newGame(diff) {
    currentDiff = diff;
    const cfg = DIFFICULTIES[diff];
    rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines;
    minesLeft = totalMines;
    gameOver  = false;
    gameWon   = false;
    firstClick = true;

    stopTimer();
    timerVal = 0;
    timerEl.textContent = '0';
    mineCountEl.textContent = minesLeft;
    resetBtn.textContent = '🐾';

    // Build empty board
    board = Array.from({ length: rows }, () =>
      Array.from({ length: cols }, () => ({
        mine: false, revealed: false, flagged: false, count: 0
      }))
    );

    renderBoard();
    hideOverlay();
  }

  // ─── Mine placement (after first click) ──────────
  function placeMines(safeR, safeC) {
    const safe = new Set();
    // Safe zone: first click + all 8 neighbors
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const r = safeR + dr, c = safeC + dc;
        if (r >= 0 && r < rows && c >= 0 && c < cols)
          safe.add(r * cols + c);
      }

    let placed = 0;
    while (placed < totalMines) {
      const idx = Math.floor(Math.random() * rows * cols);
      if (!safe.has(idx) && !board[Math.floor(idx / cols)][idx % cols].mine) {
        board[Math.floor(idx / cols)][idx % cols].mine = true;
        placed++;
      }
    }
    calculateNumbers();
  }

  function calculateNumbers() {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (board[r][c].mine) continue;
        let count = 0;
        forNeighbors(r, c, (nr, nc) => { if (board[nr][nc].mine) count++; });
        board[r][c].count = count;
      }
  }

  function forNeighbors(r, c, fn) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
          fn(nr, nc);
      }
  }

  // ─── Reveal ──────────────────────────────────────
  function reveal(r, c) {
    if (gameOver || gameWon) return;
    const cell = board[r][c];
    if (cell.revealed || cell.flagged) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      startTimer();
    }

    cell.revealed = true;

    if (cell.mine) {
      triggerGameOver(r, c);
      return;
    }

    if (cell.count === 0) floodFill(r, c);

    renderBoard();
    checkWin();
  }

  function floodFill(r, c) {
    const queue = [];
    forNeighbors(r, c, (nr, nc) => {
      const n = board[nr][nc];
      if (!n.revealed && !n.flagged && !n.mine) {
        n.revealed = true;
        if (n.count === 0) queue.push([nr, nc]);
      }
    });
    queue.forEach(([qr, qc]) => floodFill(qr, qc));
  }

  // ─── Flag ────────────────────────────────────────
  function toggleFlag(r, c) {
    if (gameOver || gameWon) return;
    const cell = board[r][c];
    if (cell.revealed) return;
    if (!cell.flagged && minesLeft === 0) return; // can't place more flags than mines

    cell.flagged = !cell.flagged;
    minesLeft += cell.flagged ? -1 : 1;
    mineCountEl.textContent = minesLeft;
    renderBoard();
    checkWin();
  }

  // ─── Win / Lose ───────────────────────────────────
  function checkWin() {
    const unrevealed = board.flat().filter(c => !c.revealed).length;
    if (unrevealed === totalMines) {
      gameWon = true;
      stopTimer();
      resetBtn.textContent = '😎';
      showWin();
    }
  }

  function triggerGameOver(hitR, hitC) {
    gameOver = true;
    stopTimer();
    resetBtn.textContent = '💀';

    // Reveal all mines
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        const cell = board[r][c];
        if (cell.mine && !cell.flagged) cell.revealed = true;
      }
    renderBoard();

    // Highlight the hit mine after render
    setTimeout(() => {
      const idx = hitR * cols + hitC;
      const cells = boardEl.querySelectorAll('.cell');
      cells[idx].classList.add('mine-hit');
      showLose();
    }, 200);
  }

  // ─── Timer ───────────────────────────────────────
  function startTimer() {
    timerHandle = setInterval(() => {
      timerVal++;
      timerEl.textContent = timerVal;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerHandle);
    timerHandle = null;
  }

  // ─── Render ──────────────────────────────────────
  function renderBoard() {
    boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;
    boardEl.innerHTML = '';

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = board[r][c];
        const el = document.createElement('div');
        el.className = 'cell';

        if (cell.revealed) {
          el.classList.add('revealed');
          if (cell.mine) {
            el.classList.add('mine-revealed');
            el.textContent = '🐶';
          } else if (cell.count > 0) {
            el.textContent = cell.count;
            el.classList.add(NUM_COLORS[cell.count]);
          }
        } else if (cell.flagged) {
          el.classList.add('flagged');
          el.textContent = '🐾';
        }

        el.addEventListener('click', () => reveal(r, c));
        el.addEventListener('contextmenu', e => { e.preventDefault(); toggleFlag(r, c); });

        boardEl.appendChild(el);
      }
    }
  }

  // ─── Overlay ─────────────────────────────────────
  function showWin() {
    modalIcon.textContent  = '🥳';
    modalTitle.textContent = 'Good boy, you win!';
    modalSub.textContent   = 'Max is proud. All mines have been sniffed out.';
    modalTimeEl.textContent = timerVal;
    showOverlay();
    spawnConfetti();
  }

  function showLose() {
    modalIcon.textContent  = '🐶';
    modalTitle.textContent = 'Woof! You found Max.';
    modalSub.textContent   = 'Max was hiding in that spot. Don\'t feel bad — he\'s very sneaky.';
    modalTimeEl.textContent = timerVal;
    showOverlay();
  }

  function showOverlay() { overlay.classList.add('visible'); }
  function hideOverlay()  { overlay.classList.remove('visible'); }

  // ─── Confetti ────────────────────────────────────
  function spawnConfetti() {
    const emojis = ['🐾', '🦴', '🐶', '🎉', '⭐'];
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top  = '-40px';
        const dur = 1.8 + Math.random() * 1.5;
        el.style.animationDuration = dur + 's';
        el.style.fontSize = (14 + Math.random() * 16) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), dur * 1000);
      }, i * 60);
    }
  }

  // ─── Events ──────────────────────────────────────
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      newGame(btn.dataset.diff);
    });
  });

  resetBtn.addEventListener('click', () => newGame(currentDiff));
  playAgain.addEventListener('click', () => { hideOverlay(); newGame(currentDiff); });

  // Prevent context menu on board
  boardEl.addEventListener('contextmenu', e => e.preventDefault());

  // ─── Start ───────────────────────────────────────
  newGame('puppy');
</script>
</body>
</html>
